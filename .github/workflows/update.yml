name: Update Subsidy Data

on:
  schedule:
    - cron: '0 23 * * *'   # 毎朝 8:00 JST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-subsidy-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: robots.txt チェック
        run: python -m scraper.robots_check

      - name: スクレイピング
        run: python -m scraper.scraper

      - name: 差分検出
        run: python -m scraper.diff_check

      - name: AI タグ付け
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m scraper.ai_tag

      - name: 静的サイト生成
        run: python -m scraper.build

      - name: 変更をコミット
        run: |
          git config user.name "subsidy-bot"
          git config user.email "subsidy-bot@users.noreply.github.com"
          git add data/ docs/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "chore: update subsidies $(date -u '+%Y-%m-%d')"
            git push
          fi
